nowo_uptime_monitor:
    retention:
        detail_days: 30
    ui:
        framework: tabler
        tabler:
            skip_cdn: false
    templates:
        layout: '@NowoUptimeMonitorBundle/layout.html.twig'
    dashboard:
        path: /uptime
        sync: polling
        mercure:
            topic_template: '/uptime/{tenant}'
    status_page:
        enabled: true
        path: /status
